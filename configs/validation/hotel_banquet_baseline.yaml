# EXPERIMENT_VALIDATION_PLAN.md 2条: Baseline (Myopic, 待機位置最適化なし, 将来情報なし)
experiment:
  name: hotel_banquet_baseline
  random_seed: 3
  repetitions: 50

building:
  floors: 8
  lobby_floor: 1

elevators:
  count: 3
  capacity_people: 15
  seconds_per_floor: 2.5
  start_delay_seconds: 1.0
  door_open_seconds: 1.5
  door_close_seconds: 1.5
  boarding_seconds_per_person: 0.7
  alighting_seconds_per_person: 0.6

traffic:
  pattern: hotel
  baseline_rate_per_hour: 40.0
  baseline_pattern: down_peak

hotel_events:
  - event_id: banquet_001
    event_type: banquet_end
    start_time: 1800
    end_time: 1800
    source_floors: [3]
    destination_distribution:
      1: 0.60
      6: 0.10
      7: 0.15
      8: 0.15
    expected_people: 120
    spread_seconds: 300
    group_size: 1
    luggage_factor: 1.0

scheduler:
  type: myopic
  immediate_assignment: true

parking:
  enabled: false

prediction:
  type: no_prediction

simulation:
  warmup_seconds: 300
  duration_seconds: 3600
  cooldown_seconds: 600

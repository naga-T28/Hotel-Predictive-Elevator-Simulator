# EXPERIMENT_VALIDATION_PLAN.md 2条: Baseline (Myopic, 待機位置最適化なし, 将来情報なし)
# hotel_checkout_trio.yaml と同一の需要・乱数シードで、"何もしない" 基準を与える。
experiment:
  name: hotel_checkout_baseline
  random_seed: 1
  repetitions: 50

building:
  floors: 8
  lobby_floor: 1

elevators:
  count: 3
  capacity_people: 15
  seconds_per_floor: 2.5
  start_delay_seconds: 1.0
  door_open_seconds: 1.5
  door_close_seconds: 1.5
  boarding_seconds_per_person: 0.7
  alighting_seconds_per_person: 0.6

traffic:
  pattern: hotel
  baseline_rate_per_hour: 60.0
  baseline_pattern: down_peak

hotel_events:
  - event_id: checkout_001
    event_type: checkout
    start_time: 3600
    end_time: 3600
    source_floors: [2, 3, 4, 5, 6, 7, 8]
    destination_distribution:
      1: 1.0
    expected_people: 150
    spread_seconds: 1800
    group_size: 2
    luggage_factor: 1.5

scheduler:
  type: myopic
  immediate_assignment: true

parking:
  enabled: false

prediction:
  type: no_prediction

simulation:
  warmup_seconds: 300
  duration_seconds: 7200
  cooldown_seconds: 600

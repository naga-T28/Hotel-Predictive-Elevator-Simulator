# EXPERIMENT_VALIDATION_PLAN.md 3.4: 予測時間スイープ (40秒)。hotel_checkout_trio.yaml のhorizon_secondsのみ変更 (60秒は既存trioでカバー)。
building:
  floors: 8
  lobby_floor: 1
elevators:
  alighting_seconds_per_person: 0.6
  boarding_seconds_per_person: 0.7
  capacity_people: 15
  count: 3
  door_close_seconds: 1.5
  door_open_seconds: 1.5
  seconds_per_floor: 2.5
  start_delay_seconds: 1.0
experiment:
  name: hotel_checkout_trio_horizon_40
  random_seed: 1
  repetitions: 50
hotel_events:
- destination_distribution:
    1: 1.0
  end_time: 3600
  event_id: checkout_001
  event_type: checkout
  expected_people: 150
  group_size: 2
  luggage_factor: 1.5
  source_floors:
  - 2
  - 3
  - 4
  - 5
  - 6
  - 7
  - 8
  spread_seconds: 1800
  start_time: 3600
parking:
  enabled: true
  reposition_interval_seconds: 30
  strategy: all_to_lobby
prediction:
  horizon_seconds: 40
  number_of_continuations: 1
  optimization_horizon_seconds: 120
  probability_threshold: 0.0
  type: hotel_informed
scheduler:
  immediate_assignment: true
  type: predictive
simulation:
  cooldown_seconds: 600
  duration_seconds: 7200
  warmup_seconds: 300
traffic:
  baseline_pattern: down_peak
  baseline_rate_per_hour: 60.0
  pattern: hotel

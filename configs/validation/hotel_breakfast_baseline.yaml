# EXPERIMENT_VALIDATION_PLAN.md 2条・3.2: Baseline (Myopic, 待機位置最適化なし, 将来情報なし)
experiment:
  name: hotel_breakfast_baseline
  random_seed: 2
  repetitions: 50

building:
  floors: 8
  lobby_floor: 1

elevators:
  count: 3
  capacity_people: 15
  seconds_per_floor: 2.5
  start_delay_seconds: 1.0
  door_open_seconds: 1.5
  door_close_seconds: 1.5
  boarding_seconds_per_person: 0.7
  alighting_seconds_per_person: 0.6

traffic:
  pattern: hotel
  baseline_rate_per_hour: 60.0
  baseline_pattern: down_peak

hotel_events:
  - event_id: breakfast_start
    event_type: breakfast_start
    start_time: 1800
    end_time: 1800
    source_floors: [3, 4, 5, 6, 7, 8]
    destination_distribution:
      2: 1.0
    expected_people: 200
    spread_seconds: 2700
    group_size: 2
    luggage_factor: 1.0

  - event_id: breakfast_end
    event_type: breakfast_end
    start_time: 7200
    end_time: 7200
    source_floors: [2]
    destination_distribution:
      1: 0.15
      3: 0.14
      4: 0.14
      5: 0.14
      6: 0.14
      7: 0.15
      8: 0.14
    expected_people: 190
    spread_seconds: 2700
    group_size: 2
    luggage_factor: 1.0

scheduler:
  type: myopic
  immediate_assignment: true

parking:
  enabled: false

prediction:
  type: no_prediction

simulation:
  warmup_seconds: 300
  duration_seconds: 9000
  cooldown_seconds: 600

experiment:
  name: smoke_test
  random_seed: 1
  repetitions: 2

building:
  floors: 8
  lobby_floor: 1

elevators:
  count: 3
  capacity_people: 15
  seconds_per_floor: 2.5
  start_delay_seconds: 1.0
  door_open_seconds: 1.5
  door_close_seconds: 1.5
  boarding_seconds_per_person: 0.7
  alighting_seconds_per_person: 0.6

traffic:
  pattern: down_peak
  total_arrival_rate_per_hour: 453.6

scheduler:
  type: myopic
  immediate_assignment: true

prediction:
  type: no_prediction
  horizon_seconds: 10
  optimization_horizon_seconds: 60
  probability_threshold: 0.2
  number_of_continuations: 1

simulation:
  warmup_seconds: 30
  duration_seconds: 180
  cooldown_seconds: 30

experiment:
  name: trajectory_prediction
  random_seed: 42
  repetitions: 5

building:
  floors: 8
  lobby_floor: 1

elevators:
  count: 3
  capacity_people: 15
  seconds_per_floor: 2.5
  start_delay_seconds: 1.0
  door_open_seconds: 1.5
  door_close_seconds: 1.5
  boarding_seconds_per_person: 0.7
  alighting_seconds_per_person: 0.6

traffic:
  pattern: trajectory

trajectory:
  grid_nx: 50
  grid_ny: 50
  floor_width_m: 20.0
  floor_height_m: 20.0
  walking_speed_mps: 1.2
  walk_start_rate_per_hour: 324.0
  elevator_bound_probability: 0.2
  training_epochs: 20
  training_batch_size: 20
  training_duration_seconds: 600

scheduler:
  type: predictive
  immediate_assignment: true

prediction:
  type: trajectory
  horizon_seconds: 10
  optimization_horizon_seconds: 120
  probability_threshold: 0.2
  number_of_continuations: 1

simulation:
  warmup_seconds: 300
  duration_seconds: 3600
  cooldown_seconds: 300
